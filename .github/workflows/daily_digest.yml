name: Daily Research Digest

on:
  schedule:
    - cron: '0 11 * * 1-5'  # 11:00 UTC = 6:00 AM EST, weekdays only
  workflow_dispatch:

concurrency:
  group: daily-digest
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  digest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run digest
        # --full-text adds ~1s per article for web fetching; --max-articles 50 caps total
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python -m src.main --full-text --config config.yaml --seen-file data/seen_articles.json

      - name: Commit updated seen articles
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/seen_articles.json
          git diff --staged --quiet || git commit -m "chore: update seen articles [skip ci]"
          git push
